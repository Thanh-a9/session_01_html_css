<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Debug Form</title>
</head>
<body>

<form action="#" method="POST">

    <label for="ten">Tên:</label><br>
    <input type="text" id="ten" name="ten" placeholder="Nguyễn Văn An" required><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" placeholder="Email của bạn" required><br><br>

    <label for="mat-khau">Mật khẩu:</label><br>
    <input type="password" id="mat-khau" name="mat_khau" placeholder="Mật khẩu" required><br><br>

    <label for="xac-nhan">Xác nhận mật khẩu:</label><br>
    <input type="password" id="xac-nhan" name="xac_nhan_mat_khau" placeholder="Nhập lại mật khẩu" required><br><br>

    <label for="dien-thoai">Phone:</label><br>
    <input type="tel" id="dien-thoai" name="dien_thoai" placeholder="0901234567" pattern="[0-9]{10}"><br><br>

    <label for="thanh-pho">Thành phố:</label><br>
    <select id="thanh-pho" name="thanh_pho">
        <option value="hn">Hà Nội</option>
        <option value="hcm">TP.HCM</option>
    </select><br><br>

    <input type="checkbox" id="dong-y" name="dong_y" required>
    <label for="dong-y">Tôi đồng ý điều khoản</label><br><br>

    <button type="submit">Gửi</button>

</form>

</body>
</html>
