<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>

    <style>
        body {
            background-color: #f0f0f0;
            padding: 30px;
        }
        h1 {
            color: #333333;
        }
        form {
            background-color: white;
            padding: 20px;
            width: 500px;
        }
        fieldset {
            margin-bottom: 20px;
        }
        /* mỗi dòng label + input */
        .dong {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 6px;
            font-size: 14px;
        }
        button {
            padding: 8px 20px;
            font-size: 14px;
            margin-right: 10px;
        }

        #btn-submit {
            background-color: #2255aa;
            color: white;
        }

        #btn-reset {
            background-color: white;
        }
    </style>
</head>

<body>

    <h1>Đăng ký tài khoản E-Commerce</h1>

    <form action="#" method="POST">

        <!-- FIELDSET 1: Thông tin cá nhân-->
        <fieldset>
            <legend>Thông tin cá nhân</legend>

            <!-- Họ tên -->
            <div class="dong">
                <label for="ho-ten">Họ và tên *</label>
                <input
                    type="text"
                    id="ho-ten"
                    name="ho_ten"
                    placeholder="Ví dụ: Nguyen Van An"
                    required
                    minlength="2"
                    maxlength="50"
                >
            </div>

            <!-- Email -->
            <div class="dong">
                <label for="email">Email *</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="ten@gmail.com"
                    required
                >
            </div>

            <!-- So dien thoai -->
            <div class="dong">
                <label for="dien-thoai">Số điện thoại</label>
                <input
                    type="tel"
                    id="dien-thoai"
                    name="dien_thoai"
                    placeholder="0912345678"
                    pattern="[0-9]{10}"
                >
                <small>Nhập đúng 10 chữ số</small>
            </div>

            <!-- Ngay sinh -->
            <div class="dong">
                <label for="ngay-sinh">Ngày sinh</label>
                <input
                    type="date"
                    id="ngay-sinh"
                    name="ngay_sinh"
                >
            </div>

        </fieldset>


        <!-- FIELDSET 2: Tài khoản-->
        <fieldset>
            <legend>Tài khoản</legend>

            <!-- Username -->
            <div class="dong">
                <label for="username">Tên đăng nhập *</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="vi_du_123"
                    required
                    pattern="[a-zA-Z0-9_]{3,20}"
                >
                <small>3-20 ký tự, chỉ dùng chữ cái, số và dấu _</small>
            </div>

            <!-- Mat khau -->
            <div class="dong">
                <label for="mat-khau">Mật khẩu *</label>
                <input
                    type="password"
                    id="mat-khau"
                    name="mat_khau"
                    placeholder="Tối thiểu 8 ký tự"
                    required
                    minlength="8"
                    pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
                >
                <small>Ít nhất 8 ký tự, có 1 chữ hoa và 1 chữ số</small>
            </div>

            <!-- Xac nhan mat khau -->
            <div class="dong">
                <label for="xac-nhan">Xác nhận mật khẩu *</label>
                <input
                    type="password"
                    id="xac-nhan"
                    name="xac_nhan_mat_khau"
                    placeholder="Nhập lại mật khẩu"
                    required
                    minlength="8"
                    pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
                >
            </div>

        </fieldset>

        <!-- FIELDSET 3: Thông tin giao hàng-->
        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <!-- Thanh pho -->
            <div class="dong">
                <label for="thanh-pho">Tỉnh / Thành phố *</label>
                <select id="thanh-pho" name="thanh_pho" required>
                    <option value="">-- Chọn --</option>
                    <option value="hn">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="dn">Đà Nẵng</option>
                    <option value="hp">Hải Phòng</option>
                    <option value="ct">Cần Thơ</option>
                </select>
            </div>

            <!-- Quan huyen -->
            <div class="dong">
                <label for="quan-huyen">Quận / Huyện</label>
                <select id="quan-huyen" name="quan_huyen">
                    <option value="">-- Chọn --</option>
                    <option value="hk">Hoàn Kiếm</option>
                    <option value="dd">Đống Đa</option>
                    <option value="cf">Cầu Giấy</option>
                    <option value="hbt">Hai Bà Trưng</option>
                </select>
            </div>

            <!-- Dia chi -->
            <div class="dong">
                <label for="dia-chi">Địa chỉ chi tiết *</label>
                <textarea
                    id="dia-chi"
                    name="dia_chi"
                    rows="3"
                    placeholder="Số nhà, tên đường, phường..."
                    required
                ></textarea>
            </div>

            <!-- Gioi tinh -->
            <div class="dong">
                <label>Giới tính</label>

                <input type="radio" id="nam" name="gioi_tinh" value="nam">
                <label for="nam" style="display:inline; font-weight:normal;">Nam</label>

                <input type="radio" id="nu" name="gioi_tinh" value="nu">
                <label for="nu" style="display:inline; font-weight:normal;">Nữ</label>

                <input type="radio" id="khac" name="gioi_tinh" value="khac">
                <label for="khac" style="display:inline; font-weight:normal;">Khác</label>
            </div>

        </fieldset>

        <!-- Checkbox dieu khoan -->
        <div class="dong">
            <input type="checkbox" id="dong-y" name="dong_y" required>
            <label for="dong-y" style="display:inline; font-weight:normal;">
                Tôi đồng ý với điều khoản dịch vụ *
            </label>
        </div>


        <!-- Nut bam -->
        <div>
            <button type="submit" id="btn-submit">Đăng ký</button>
            <button type="reset" id="btn-reset">Nhập lại</button>
        </div>

    </form>

</body>

</html>
